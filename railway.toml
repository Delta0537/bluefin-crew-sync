# Deploy/runtime only — leave image build to auto-detected root Dockerfile.
# (Explicit [build] builder = DOCKERFILE has caused empty or stuck builds for some projects.)
# https://docs.railway.com/guides/dockerfiles

[deploy]
# Railway project-level "Logs" often looks empty when nothing writes to stdout; emit one line per boot.
# (railway.toml overrides Dockerfile CMD when present.)
startCommand = "sh -c 'echo bluefin-crew-sync-node-server-start && exec node .output/server/index.mjs'"
healthcheckPath = "/"
healthcheckTimeout = 120
